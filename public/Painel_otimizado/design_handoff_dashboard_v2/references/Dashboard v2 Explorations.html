<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Dashboard v2 — Explorações</title>
  <link rel="stylesheet" href="colors_and_type.css">
  <style>
    html, body { margin: 0; padding: 0; height: 100%; background: #f1f0ec; font-family: var(--font-sans); }
    .device {
      position: relative;
      width: 100%; height: 100%;
      border-radius: 38px; overflow: hidden;
      background: var(--background);
      box-shadow: inset 0 0 0 1px oklch(.25 .02 160 / .08);
    }
    .device::before {
      content: '9:41';
      position: absolute; top: 0; left: 0; right: 0; z-index: 50;
      height: 44px;
      display: flex; align-items: center; padding: 14px 28px 0;
      font-family: -apple-system, "SF Pro", system-ui;
      font-weight: 600; font-size: 15px; pointer-events: none;
    }
    .device::after {
      content: '';
      position: absolute; bottom: 0; left: 0; right: 0; z-index: 60;
      height: 70px;
      background: linear-gradient(180deg, transparent 0%, var(--background) 30%);
      pointer-events: none;
    }
    .island {
      position: absolute; top: 12px; left: 50%; transform: translateX(-50%);
      width: 110px; height: 32px; border-radius: 9999px; background: #000; z-index: 51;
    }
    .homeind {
      position: absolute; bottom: 8px; left: 50%; transform: translateX(-50%);
      width: 130px; height: 5px; border-radius: 9999px;
      background: oklch(.25 .02 160 / .35); z-index: 70;
    }
    .device > .surface { position: absolute; inset: 50px 0 0; overflow: hidden; }
  </style>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel" src="design-canvas.jsx"></script>
  <script type="text/babel" src="dashboards/DashboardEditorial.jsx"></script>
  <script type="text/babel" src="dashboards/DashboardBento.jsx"></script>
  <script type="text/babel">
    function Page() {
      return (
        <DesignCanvas style={{ height: '100vh', background: '#f1f0ec' }}>
          <DCSection
            id="dashboards-v2"
            title="Dashboard v2 — 2 direções com identidade"
            subtitle="Toque numa artboard pra abrir em tela cheia. Scrolla pra ver tudo — carrossel auto-avança a cada 5s."
          >
            <DCArtboard id="editorial" label="A · Editorial Vivo — cada seção com cor/textura própria" width={390} height={844}>
              <div className="device" data-screen-label="01 Dashboard A — Editorial">
                <div className="island" />
                <div className="surface">
                  <DashboardEditorial />
                </div>
                <div className="homeind" />
              </div>
            </DCArtboard>

            <DCArtboard id="bento" label="B · Bento Mosaico — cards de tamanhos variados" width={390} height={844}>
              <div className="device" data-screen-label="02 Dashboard B — Bento">
                <div className="island" />
                <div className="surface">
                  <DashboardBento />
                </div>
                <div className="homeind" />
              </div>
            </DCArtboard>
          </DCSection>

          <DCPostIt top={120} left={40} width={230} rotate={-3}>
            <strong>A · Editorial</strong>: scroll vertical, cada seção ocupa toda a largura mas tem <strong>textura/cor própria</strong> (cream papel, azul cobalto, verde água, rosa cozinha). Sente como uma revista.
          </DCPostIt>
          <DCPostIt top={520} left={40} width={230} rotate={2}>
            <strong>B · Bento</strong>: grid mosaico de cards de tamanhos variados. Vibe Apple Health × Bento UI. Mais denso, mais visual. Cada tile é claramente uma coisa diferente.
          </DCPostIt>
          <DCPostIt top={120} right={40} width={220} rotate={3}>
            Nas duas: <strong>Maya com personalidade</strong> (aura respirando + indicador "✨ ativa"), <strong>Metas da semana</strong> (NOVO), <strong>Fio completo</strong> com mood + sentimento inline, <strong>carrossel auto-scroll</strong>, <strong>sem</strong> "Últimos check-ins" — fundiu no Fio.
          </DCPostIt>
        </DesignCanvas>
      );
    }
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<Page />);
  </script>
</body>
</html>
