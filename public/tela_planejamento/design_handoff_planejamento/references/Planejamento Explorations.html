<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Planejamento — Explorações</title>
  <link rel="stylesheet" href="colors_and_type.css">
  <style>
    html, body { margin: 0; padding: 0; height: 100%; background: #f1f0ec; font-family: var(--font-sans); }
    .device {
      position: relative;
      width: 100%; height: 100%;
      border-radius: 38px; overflow: hidden;
      background: var(--background);
      box-shadow: inset 0 0 0 1px oklch(.25 .02 160 / .08);
    }
    .device::before {
      content: '9:41';
      position: absolute; top: 0; left: 0; right: 0; z-index: 50;
      height: 44px;
      display: flex; align-items: center; padding: 14px 28px 0;
      font-family: -apple-system, "SF Pro", system-ui;
      font-weight: 600; font-size: 15px; pointer-events: none;
    }
    .device::after {
      content: '';
      position: absolute; bottom: 0; left: 0; right: 0; z-index: 60;
      height: 70px;
      background: linear-gradient(180deg, transparent 0%, var(--background) 30%);
      pointer-events: none;
    }
    .island {
      position: absolute; top: 12px; left: 50%; transform: translateX(-50%);
      width: 110px; height: 32px; border-radius: 9999px; background: #000; z-index: 51;
    }
    .homeind {
      position: absolute; bottom: 8px; left: 50%; transform: translateX(-50%);
      width: 130px; height: 5px; border-radius: 9999px;
      background: oklch(.25 .02 160 / .35); z-index: 70;
    }
    .device > .surface { position: absolute; inset: 50px 0 0; overflow: hidden; }
  </style>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel" src="design-canvas.jsx"></script>
  <script type="text/babel" src="dashboards/PlanBento.jsx"></script>
  <script type="text/babel" src="dashboards/PlanEditorial.jsx"></script>
  <script type="text/babel">
    function Page() {
      return (
        <DesignCanvas style={{ height: '100vh', background: '#f1f0ec' }}>
          <DCSection
            id="plan"
            title="Planejamento — 2 direções com radar de áreas"
            subtitle="Aranha/radar como destaque visual. Toque numa artboard pra ver em tela cheia."
          >
            <DCArtboard id="bento" label="A · Bento Planner (segue dashboard)" width={390} height={844}>
              <div className="device" data-screen-label="01 Plan A — Bento">
                <div className="island" />
                <div className="surface">
                  <PlanBento />
                </div>
                <div className="homeind" />
              </div>
            </DCArtboard>

            <DCArtboard id="editorial" label="B · Planner Editorial (livro de bordo)" width={390} height={844}>
              <div className="device" data-screen-label="02 Plan B — Editorial">
                <div className="island" />
                <div className="surface">
                  <PlanEditorial />
                </div>
                <div className="homeind" />
              </div>
            </DCArtboard>
          </DCSection>

          <DCPostIt top={120} left={40} width={230} rotate={-3}>
            <strong>A · Bento</strong>: segue a linguagem do dashboard. Pedras como cards com tamanho diferente (I=grande, II=médio, III=pequeno). Radar dentro de card. <strong>Agenda compacta</strong>: 7 micro-colunas no topo com pontinhos por tarefa, foco no dia selecionado embaixo.
          </DCPostIt>
          <DCPostIt top={520} left={40} width={230} rotate={2}>
            <strong>B · Editorial</strong>: vibe livro de bordo. Pedras como tipografia grande (I/II/III em mono), itálico no título. Radar como protagonista visual centralizado. <strong>Timeline contínua</strong>: dias empilhados, hoje destacado, passados esmaecidos.
          </DCPostIt>
          <DCPostIt top={120} right={40} width={220} rotate={3}>
            Nas duas: <strong>radar com 9 eixos</strong>, hábitos (●) e tarefas (▢) com símbolos diferentes, Maya como pílula sutil contextual (não CTA pesado), revisão como estado de espera (só domingo).
          </DCPostIt>
        </DesignCanvas>
      );
    }
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<Page />);
  </script>
</body>
</html>
