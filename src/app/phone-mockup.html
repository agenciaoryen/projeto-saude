<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Phone Mockup — Preview do App</title>
<style>
  :root {
    --frame-color: #1a1a1a;
    --frame-highlight: #3a3a3a;
    --screen-bg: #000;
    --page-bg: #e5e5ea;
    --accent: #007aff;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    height: 100vh;
    overflow: hidden;
  }

  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    background: var(--page-bg);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  }

  .stage {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    transform-origin: center center;
  }

  /* ---- Barra de controle (URL + reload) ---- */
  .toolbar {
    display: flex;
    align-items: center;
    gap: 8px;
    background: #fff;
    padding: 8px 10px;
    border-radius: 10px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.15);
  }

  .toolbar input {
    width: 260px;
    padding: 7px 10px;
    border: 1px solid #d0d0d5;
    border-radius: 6px;
    font-size: 13px;
    outline: none;
  }

  .toolbar input:focus { border-color: var(--accent); }

  .toolbar button {
    padding: 7px 12px;
    border: none;
    border-radius: 6px;
    background: var(--accent);
    color: #fff;
    font-size: 13px;
    cursor: pointer;
  }

  .toolbar button:hover { opacity: 0.9; }

  /* ---- Moldura do iPhone ---- */
  .phone {
    position: relative;
    width: 375px;
    height: 812px;
    background: var(--frame-color);
    border-radius: 55px;
    padding: 14px;
    box-shadow:
      0 0 0 2px var(--frame-highlight) inset,
      0 25px 50px rgba(0,0,0,0.4);
  }

  /* Botões laterais */
  .phone::before, .phone::after {
    content: "";
    position: absolute;
    background: var(--frame-color);
  }

  .btn {
    position: absolute;
    background: #0f0f0f;
    border-radius: 3px;
  }
  .btn.mute   { left: -3px; top: 110px; width: 3px; height: 28px; }
  .btn.vol-up { left: -3px; top: 170px; width: 3px; height: 55px; }
  .btn.vol-down { left: -3px; top: 235px; width: 3px; height: 55px; }
  .btn.power  { right: -3px; top: 180px; width: 3px; height: 90px; }

  .screen {
    position: relative;
    width: 100%;
    height: 100%;
    background: var(--screen-bg);
    border-radius: 40px;
    overflow: hidden;
  }

  /* Dynamic Island */
  .dynamic-island {
    position: absolute;
    top: 12px;
    left: 50%;
    transform: translateX(-50%);
    width: 120px;
    height: 34px;
    background: #000;
    border-radius: 20px;
    z-index: 10;
  }

  iframe {
    width: 100%;
    height: 100%;
    border: none;
    background: #fff;
  }

  .status {
    text-align: center;
    font-size: 12px;
    color: #6b6b70;
  }
</style>
</head>
<body>

  <div class="stage" id="stage">
    <div class="toolbar">
      <input id="urlInput" type="text" value="http://localhost:3000" />
      <button onclick="loadUrl()">Carregar</button>
      <button onclick="reload()">↻</button>
    </div>

    <div class="phone">
      <div class="btn mute"></div>
      <div class="btn vol-up"></div>
      <div class="btn vol-down"></div>
      <div class="btn power"></div>
      <div class="screen">
        <div class="dynamic-island"></div>
        <iframe id="appFrame" src="http://localhost:3000"></iframe>
      </div>
    </div>

    <div class="status">Editando <code>urlInput</code> ou o <code>src</code> do iframe você aponta pra outra porta/URL.</div>
  </div>

  <script>
    function loadUrl() {
      const url = document.getElementById('urlInput').value.trim();
      document.getElementById('appFrame').src = url;
    }
    function reload() {
      const frame = document.getElementById('appFrame');
      frame.src = frame.src;
    }
    document.getElementById('urlInput').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') loadUrl();
    });

    // Escala o mockup inteiro pra caber na janela, sem cortar nem precisar rolar
    function fitStage() {
      const stage = document.getElementById('stage');
      stage.style.transform = 'scale(1)'; // reseta antes de medir
      const naturalWidth = stage.offsetWidth;
      const naturalHeight = stage.offsetHeight;

      const availableWidth = window.innerWidth * 0.98;
      const availableHeight = window.innerHeight * 0.98;

      const scale = Math.min(
        availableWidth / naturalWidth,
        availableHeight / naturalHeight,
        1.6 // permite aumentar até 160% do tamanho real em telas grandes
      );

      stage.style.transform = `scale(${scale})`;
    }

    window.addEventListener('resize', fitStage);
    window.addEventListener('load', fitStage);
    fitStage();
  </script>

</body>
</html>
